name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    name: Tests and syntax checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Run Python tests
        run: python -m pytest

      - name: Check frontend JavaScript syntax
        run: node --check static/app.js

      - name: Check whitespace
        shell: bash
        run: |
          set -euo pipefail

          check_root_commit() {
            git diff-tree --check --no-commit-id --root -r HEAD
          }

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            if git cat-file -e "${base_sha}^{commit}" 2>/dev/null; then
              git diff --check "${base_sha}...HEAD"
            else
              check_root_commit
            fi
          elif [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ] &&
            git cat-file -e "${{ github.event.before }}^{commit}" 2>/dev/null; then
            git diff --check "${{ github.event.before }}..HEAD"
          else
            check_root_commit
          fi
